<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BacMaster - Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="side-menu" class="side-menu">
        <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px;">Menu</h2>
        <button class="nav-item nav-home" onclick="showPage('home'); toggleMenu()">🏠 Accueil</button>
        <button class="nav-item nav-anglais" onclick="openSubject('Anglais'); toggleMenu()">Anglais</button>
        <button class="nav-item nav-spe1" onclick="openSubject('Anglais Spé 1'); toggleMenu()">🗣️ Spé 1</button>
        <button class="nav-item nav-spe2" onclick="openSubject('Anglais Spé 2'); toggleMenu()">💬 Spé 2</button>
        <button class="nav-item nav-maths" onclick="openSubject('Maths'); toggleMenu()">📐 Maths</button>
        <button class="nav-item nav-fr" onclick="openSubject('Français'); toggleMenu()">Français</button>
        <button class="nav-item nav-ses" onclick="openSubject('SES'); toggleMenu()">📈 SES</button>
        <button class="nav-item nav-phys" onclick="openSubject('Physique'); toggleMenu()">⚛️ Physique</button>
        <button class="nav-item nav-hist" onclick="openSubject('Histoire'); toggleMenu()">Histoire</button>
        <button class="nav-item nav-esp" onclick="openSubject('Espagnol'); toggleMenu()">Espagnol</button>
    </div>

    <nav class="top-bar">
        <button class="burger-btn" onclick="toggleMenu()">☰ MENU</button>
        <span style="font-weight: 800; margin-left: 10px; font-size: 1.2rem;">BacMaster</span>
    </nav>

    <main id="app-container">
        <section id="page-home" class="page active">
            <h1 class="main-title">Mes Matières</h1>
            <div class="subject-grid">
                <div class="subject-card eng" onclick="openSubject('Anglais')"><h2>Anglais</h2></div>
                <div class="subject-card spe1" onclick="openSubject('Anglais Spé 1')"><h2>🗣️ Spé 1</h2></div>
                <div class="subject-card spe2" onclick="openSubject('Anglais Spé 2')"><h2>💬 Spé 2</h2></div>
                <div class="subject-card math" onclick="openSubject('Maths')"><h2>📐 Maths</h2></div>
                <div class="subject-card fr" onclick="openSubject('Français')"><h2>Français</h2></div>
                <div class="subject-card ses" onclick="openSubject('SES')"><h2>📈 SES</h2></div>
                <div class="subject-card phys" onclick="openSubject('Physique')"><h2>⚛️ Physique</h2></div>
                <div class="subject-card hist" onclick="openSubject('Histoire')"><h2>Histoire</h2></div>
                <div class="subject-card esp" onclick="openSubject('Espagnol')"><h2>Espagnol</h2></div>
            </div>
        </section>
        
        <section id="page-subject" class="page">
            <h1 id="subject-title" style="margin-left: 15px;">Matière</h1>
            <div id="module-options" class="option-grid">
                <div class="option-card" onclick="openWorkspace('cours-read')"><span class="icon">📖</span><h4>Lire le Cours</h4></div>
                <div class="option-card" onclick="openWorkspace('cours-edit')"><span class="icon">✏️</span><h4>Modifier Cours</h4></div>
                <div class="option-card" onclick="openWorkspace('voc-read')"><span class="icon">📚</span><h4>Dictionnaire</h4></div>
                <div class="option-card" onclick="openWorkspace('voc-add')"><span class="icon">➕</span><h4>Ajouter Mots</h4></div>
                <div class="option-card" onclick="openWorkspace('flashcards')"><span class="icon">🎴</span><h4>Flashcards</h4></div>
                <div class="option-card" onclick="openWorkspace('eval')"><span class="icon">📝</span><h4>Exercices</h4></div>
            </div>
        </section>

        <section id="page-workspace" class="page">
            <div class="workspace-nav">
                <button class="back-btn" onclick="showPage('subject')">RETOUR</button>
                <h2 id="workspace-title" style="margin-top: 15px;">Espace de travail</h2>
            </div>

            <div id="chapter-bar-container">
                <div id="chapter-chips"></div>
            </div>

            <div id="workspace-wrapper" style="background: white; border: 2px solid #cbd5e1; border-radius: 0 10px 10px 10px; padding: 20px;">
                <div id="etiquette-title-container" style="margin-bottom:15px; border-bottom:2px dashed #cbd5e1; padding-bottom:10px;">
                    </div>
                <div id="workspace-content"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
